name: Bug Report
description: Report a bug in Qorpe.Mediator
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code to reproduce the issue.
      render: csharp

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include stack traces if applicable.

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - Qorpe.Mediator
        - Qorpe.Mediator.Behaviors
        - Qorpe.Mediator.FluentValidation
        - Qorpe.Mediator.AspNetCore
        - Qorpe.Mediator.Contracts

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.0-preview.1"

  - type: dropdown
    id: dotnet
    attributes:
      label: .NET Version
      options:
        - .NET 10
        - .NET 9
        - .NET 8

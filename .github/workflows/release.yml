name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Run Tests
        run: |
          dotnet test tests/Qorpe.Mediator.UnitTests/ --no-build --configuration Release
          dotnet test tests/Qorpe.Mediator.IntegrationTests/ --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Qorpe.Mediator/Qorpe.Mediator.csproj \
            --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Qorpe.Mediator.Contracts/Qorpe.Mediator.Contracts.csproj \
            --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Qorpe.Mediator.Behaviors/Qorpe.Mediator.Behaviors.csproj \
            --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Qorpe.Mediator.FluentValidation/Qorpe.Mediator.FluentValidation.csproj \
            --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

          dotnet pack src/Qorpe.Mediator.AspNetCore/Qorpe.Mediator.AspNetCore.csproj \
            --no-build --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkgs

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push Symbol Packages
        run: |
          dotnet nuget push ./nupkgs/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ./nupkgs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
